name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -e '.[dev]'
        working-directory: llm-finetune-pipeline
      - name: Lint
        run: ruff check src/ tests/
        working-directory: llm-finetune-pipeline
      - name: Format check
        run: ruff format --check src/ tests/
        working-directory: llm-finetune-pipeline
      - name: Type check
        run: mypy src/
        working-directory: llm-finetune-pipeline

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -e '.[dev]'
        working-directory: llm-finetune-pipeline
      - name: Run unit tests
        run: pytest tests/unit/ -v
        working-directory: llm-finetune-pipeline

  cdk-tests:
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    defaults:
      run:
        working-directory: llm-finetune-pipeline/infra/cdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -e '.[dev]'
      - name: Lint CDK code
        run: |
          ruff check stacks/ constructs/ config/ tests/ app.py
          ruff format --check stacks/ constructs/ config/ tests/ app.py
      - name: Type check CDK code
        run: mypy stacks/ constructs/ config/ app.py
      - name: Run CDK unit tests
        run: pytest tests/ -v --cov=stacks --cov=constructs --cov-report=xml
      - name: CDK synth (validates CloudFormation output)
        run: npx cdk synth --context env=dev --quiet
      - name: Fail if CDK test coverage < 85%
        run: |
          coverage=$(python -c "import xml.etree.ElementTree as ET; \
            t=ET.parse('coverage.xml'); \
            print(float(t.getroot().get('line-rate',0))*100)")
          echo "CDK test coverage: ${coverage}%"
          python -c "assert float('${coverage}') >= 85, 'Coverage below 85%'"
